[tool.ruff]
# Длина строки (в прошлом шаге мы договаривались на 100 для удобства)
line-length = 100

# Исключаем папки, которые не нужно проверять (особенно миграции и окружение!)
exclude = [
    ".git",
    "venv",
    "env",
    "__pycache__",
    "migrations",
    "media",
]

[tool.ruff.lint]
# Включаем правила:
# E, W - стандартные ошибки и предупреждения PEP 8 (основа pycodestyle)
# F - логические ошибки (основа Pyflakes, например, неиспользуемые импорты)
# I - автоматическая сортировка импортов (isort)
select = ["E", "F", "W", "I"]

# Игнорируем специфические правила, если они мешают (пока оставим пустым)
ignore = []
