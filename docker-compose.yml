services:
  db:
    image: postgres:15-alpine
    container_name: team_finder_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: team_finder_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app  # Синхронизируем файлы, чтобы видеть изменения кода без перезапуска
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
